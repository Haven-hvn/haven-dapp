name: Deploy to Orbiter

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout Haven-AOL SDK
        uses: actions/checkout@v4
        with:
          repository: Haven-hvn/haven-aol
          path: haven-aol-main

      - name: Check if API key exists
        shell: bash
        run: |
          if [ -z "${{ secrets.ORBITER_API_KEY }}" ]; then
            echo "🚨 ORBITER_API_KEY not found ! Please follow these steps:"
            echo ""
            echo "1. Go to https://app.orbiter.host/api-keys"
            echo "2. Generate a new API key"
            echo "3. Go to https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "4. Click 'New repository secret'"
            echo "5. Name: ORBITER_API_KEY"
            echo "6. Value: Your API key from step 2"
            echo "7. Click 'Add secret'"
            echo ""
            echo "Once done, re-run this workflow."
            exit 1
          fi

      - name: Check if Site ID exists
        shell: bash
        run: |
          if [ -z "${{ secrets.ORBITER_SITE_ID }}" ]; then
            echo "🚨 ORBITER_SITE_ID not found! Please add the secret."
            exit 1
          fi

      - name: Validate package manifests
        shell: bash
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8'))"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Haven-AOL SDK dependencies
        working-directory: haven-aol-main/packages/typescript
        run: npm ci

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_APP_URL: "https://haven.orbiter.website/"
          NEXT_PUBLIC_ALCHEMY_API_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_API_KEY }}
          NEXT_PUBLIC_ALCHEMY_RPC: ${{ secrets.NEXT_PUBLIC_ALCHEMY_RPC }}
          NEXT_PUBLIC_ARKIV_RPC_URL: ${{ secrets.NEXT_PUBLIC_ARKIV_RPC_URL || 'https://braga.hoodi.arkiv.network/rpc' }}
          NEXT_PUBLIC_ARKIV_API_URL: ${{ secrets.NEXT_PUBLIC_ARKIV_API_URL || 'https://braga.hoodi.arkiv.network/api' }}
          NEXT_PUBLIC_LIT_NETWORK: ${{ secrets.NEXT_PUBLIC_LIT_NETWORK || 'naga-dev' }}
        run: |
          echo "Building Next.js application..."
          npm run build

      - name: Verify build output
        run: |
          if [ ! -d "./out" ]; then
            echo "❌ Build failed: ./out directory not found"
            exit 1
          fi
          echo "✅ Build successful: ./out directory exists"
          ls -la ./out

      - name: Deploy to Orbiter
        env:
          ORBITER_API_KEY: ${{ secrets.ORBITER_API_KEY }}
          SOURCE: github-action
        run: npx orbiter-cli update ./out --siteId ${{ secrets.ORBITER_SITE_ID }}
